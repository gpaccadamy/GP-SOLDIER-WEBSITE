<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>GP Soldier Academy – Best Defence Coaching</title>
  <meta name="description" content="GP Soldier Academy – NDA, CDS, AFCAT, SSB coaching. 5000+ successful students, 95% selection rate."/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --gold: #ffc107;               /* brighter, more salient yellow-gold */
      --gold-light: #ffecb3;
      --gold-dim: rgba(255,193,7,0.18);
      --cream: #fff8e1;              /* light cream for highlights & better contrast */
      --cream-dark: #f5e8c7;
      --dark: #060a04;
      --dark2: #0d1408;
      --dark3: #141c0a;
      --surface: #1e2a12;
      --surface2: #253314;
      --border: rgba(255,193,7,0.22);
      --border2: rgba(255,193,7,0.35);
      --text: #f5f0e0;
      --muted: #8a8270;
      --muted2: #b0a68f;
      --red: #c53030;
      --green: #2d6a35;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* NAV – simplified, no back button */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 500;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(180deg, rgba(6,10,4,0.98) 0%, rgba(6,10,4,0.0) 100%);
      transition: all 0.4s;
    }
    .nav.scrolled { background: rgba(6,10,4,0.98); border-bottom: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .nav-logo-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid var(--gold); overflow: hidden; flex-shrink: 0;
      box-shadow: 0 0 16px var(--gold-dim);
    }
    .nav-logo-ring img { width:100%; height:100%; object-fit:cover; }
    .nav-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.25rem; font-weight: 700;
      letter-spacing: 2.5px; color: var(--gold);
      flex: 1;
    }

    /* HERO – bigger, staggered title animation */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(45,90,20,0.3) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(20,40,10,0.45) 0%, transparent 60%),
        linear-gradient(180deg, #060a04 0%, #0d1a07 40%, #060a04 100%);
    }
    .hero-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 50px,
        var(--gold-dim) 50px,
        var(--gold-dim) 52px
      );
    }
    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(6,10,4,0.85) 100%);
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); pointer-events: none;
      animation: orbFloat 14s ease-in-out infinite;
    }
    .orb-1 { width: 340px; height: 340px; background: var(--gold-dim); top: 5%; left: -15%; animation-delay: 0s; }
    .orb-2 { width: 240px; height: 240px; background: rgba(50,100,20,0.2); bottom: 15%; right: -10%; animation-delay: -7s; }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-40px) scale(1.08); }
      66% { transform: translate(-25px,35px) scale(0.94); }
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 140px 20px 100px;
      max-width: 640px; margin: 0 auto;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold-dim);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 28px;
      opacity: 0; animation: fadeUp 0.8s ease forwards 0.4s;
    }
    .eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: blink 1.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4.5rem, 20vw, 8rem);
      line-height: 0.9;
      letter-spacing: 4px;
      margin-bottom: 24px;
    }
    .hero h1 span {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px);
      animation: titleStagger 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .hero h1 span:nth-child(1) { animation-delay: 0.5s; }
    .hero h1 span:nth-child(2) { animation-delay: 0.7s; color: var(--gold); }
    @keyframes titleStagger {
      to { opacity:1; transform:translateY(0); }
    }
    .line-gold {
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 100%;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

    .hero-sub {
      font-size: 1.05rem; color: var(--muted2);
      letter-spacing: 1.2px; line-height: 1.7;
      margin-bottom: 36px;
      opacity: 0; animation: fadeUp 1s ease forwards 1.2s;
    }
    .hero-sub strong { color: var(--cream); font-weight: 600; }

    .hero-cta {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 1s ease forwards 1.4s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #ffb300);
      color: #000; font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 1.8px; text-transform: uppercase;
      padding: 14px 32px; border-radius: 8px; border: none;
      cursor: pointer; transition: all 0.25s;
      box-shadow: 0 6px 24px var(--gold-dim);
      animation: pulseBtn 2.5s infinite;
    }
    @keyframes pulseBtn {
      0%,100% { box-shadow: 0 6px 24px var(--gold-dim); }
      50%     { box-shadow: 0 8px 32px rgba(255,193,7,0.4); }
    }
    .btn-primary:active { transform: scale(0.96); }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--border2);
      color: var(--cream);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 1.8px; text-transform: uppercase;
      padding: 14px 32px; border-radius: 8px;
      transition: all 0.25s;
    }
    .btn-secondary:hover, .btn-secondary:active {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }

    .scroll-hint {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--muted); font-size: 0.7rem; letter-spacing: 2.5px; text-transform: uppercase;
      opacity: 0; animation: fadeUp 0.8s ease forwards 1.8s;
    }
    .scroll-arrow { width: 22px; height: 22px; border-right: 2px solid var(--muted); border-bottom: 2px solid var(--muted); transform: rotate(45deg); animation: bounce 1.8s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:rotate(45deg) translateY(0);} 50%{transform:rotate(45deg) translateY(8px);} }

    /* Rest of sections – with hover animations */
    .section { padding: 80px 20px; max-width: 640px; margin: 0 auto; }
    .section-tag {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--gold); font-size: 0.72rem;
      font-weight: 700; letter-spacing: 3.5px; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .tag-line { width: 28px; height: 2px; background: var(--gold); }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 9vw, 3.8rem);
      letter-spacing: 2.5px; line-height: 1.05;
      margin-bottom: 16px;
    }
    .section-title .gold { color: var(--gold); }

    .course-card, .why-item, .mentor-card {
      transition: all 0.3s ease;
    }
    .course-card:hover, .course-card:active,
    .why-item:hover, .why-item:active,
    .mentor-card:hover, .mentor-card:active {
      transform: translateY(-8px) scale(1.03);
      border-color: var(--gold);
      box-shadow: 0 12px 32px rgba(255,193,7,0.15);
    }
    .mentor-card:hover .mentor-img { filter: sepia(0%) contrast(1.1) brightness(1.05); }

    /* CTA button already has pulse – enhanced contrast */
    .wa-btn {
      background: #128c4a; color: white;
      animation: pulseBtn 3s infinite alternate;
    }

    /* Remove bottom nav */
    /* .bottom-nav { display: none; }  – simply not included */

    /* Rest of your original styles remain similar – only key changes shown above */
    /* ... (keep stats, courses, mentors, why, cta, footer styles mostly as-is, but update colors to use --cream where text needs to pop) ... */

    .stat-num { color: var(--gold); }
    .mentor-name { color: var(--gold); }
    .why-title { color: var(--cream); }
    .cta-title { color: var(--cream); }

    /* Scroll reveal (unchanged) */
    .reveal {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-logo-ring">
    <img src="gplogo.jpg" alt="GP Soldiers">
  </div>
  <div class="nav-title">GP SOLDIERS ACADEMY</div>
</nav>

<section class="hero">
  <div class="hero-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="hero-content">
    <div class="hero-eyebrow">
      <div class="eyebrow-dot"></div>
      India's Premier Defence Academy
    </div>
    <h1>
      <span>G</span><span>P</span><br>
      <span class="line-gold">SOLDIER</span><br>
      <span>ACADEMY</span>
    </h1>
    <p class="hero-sub">
      <strong>NDA  │  CDS  │  AFCAT  │  SSB</strong><br>
      Army • Navy • Air Force • Coast Guard<br>
      Shaping Tomorrow's Warriors Since 2014
    </p>
    <div class="hero-cta">
      <a href="tel:+919419575333" class="btn-primary">📞 Call Now</a>
      <a href="exams.html" class="btn-secondary">Take Free Test</a>
    </div>
  </div>
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- Keep all other sections: stats, about, courses, mentors, why us, cta, footer -->

<!-- No bottom nav -->

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Counter (unchanged)
  const counterEls = document.querySelectorAll('[data-target]');
  const countObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const el = e.target;
        const target = parseInt(el.dataset.target);
        let start = 0;
        const step = target / 60;
        const timer = setInterval(() => {
          start += step;
          if (start >= target) { el.textContent = target.toLocaleString() + '+'; clearInterval(timer); }
          else { el.textContent = Math.floor(start).toLocaleString(); }
        }, 20);
        countObserver.unobserve(el);
      }
    });
  }, { threshold: 0.5 });
  counterEls.forEach(el => countObserver.observe(el));
</script>
</body>
</html>
